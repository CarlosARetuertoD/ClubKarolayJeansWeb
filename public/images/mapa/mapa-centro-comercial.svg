<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#201e1e"/>
      <stop offset="50%" style="stop-color:#262222"/>
      <stop offset="100%" style="stop-color:#1a1717"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect x="0" y="0" width="800" height="4" fill="#9b6d53" opacity="0.7"/>
  <rect x="0" y="596" width="800" height="4" fill="#9b6d53" opacity="0.7"/>
  <!-- Title -->
  <text x="400" y="50" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="600" fill="#9b6d53" text-anchor="middle" letter-spacing="6">CENTRO COMERCIAL - PLANTA</text>
  <!-- Mall outline -->
  <rect x="80" y="80" width="640" height="440" rx="8" fill="none" stroke="#444" stroke-width="2"/>
  <!-- Corridors -->
  <rect x="80" y="280" width="640" height="40" fill="#333" opacity="0.5"/>
  <rect x="370" y="80" width="40" height="440" fill="#333" opacity="0.5"/>
  <!-- Store blocks - Row 1 -->
  <rect x="100" y="100" width="120" height="160" rx="4" fill="#2d2929" stroke="#444" stroke-width="1"/>
  <text x="160" y="185" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">LOCAL 101</text>
  <rect x="240" y="100" width="110" height="160" rx="4" fill="#2d2929" stroke="#444" stroke-width="1"/>
  <text x="295" y="185" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">LOCAL 102</text>
  <rect x="430" y="100" width="120" height="160" rx="4" fill="#2d2929" stroke="#444" stroke-width="1"/>
  <text x="490" y="185" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">LOCAL 103</text>
  <!-- KAROLAY highlighted block -->
  <rect x="570" y="100" width="130" height="160" rx="4" fill="#9b6d53" fill-opacity="0.25" stroke="#9b6d53" stroke-width="2.5"/>
  <text x="635" y="170" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="700" fill="#9b6d53" text-anchor="middle" letter-spacing="2">KAROLAY</text>
  <text x="635" y="192" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#9b6d53" text-anchor="middle" opacity="0.7">JEANS</text>
  <!-- Pulse ring around Karolay -->
  <rect x="565" y="95" width="140" height="170" rx="6" fill="none" stroke="#9b6d53" stroke-width="1" opacity="0.3"/>
  <!-- Store blocks - Row 2 -->
  <rect x="100" y="340" width="120" height="160" rx="4" fill="#2d2929" stroke="#444" stroke-width="1"/>
  <text x="160" y="425" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">LOCAL 201</text>
  <rect x="240" y="340" width="110" height="160" rx="4" fill="#2d2929" stroke="#444" stroke-width="1"/>
  <text x="295" y="425" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">LOCAL 202</text>
  <rect x="430" y="340" width="120" height="160" rx="4" fill="#2d2929" stroke="#444" stroke-width="1"/>
  <text x="490" y="425" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">LOCAL 203</text>
  <rect x="570" y="340" width="130" height="160" rx="4" fill="#2d2929" stroke="#444" stroke-width="1"/>
  <text x="635" y="425" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">LOCAL 204</text>
  <!-- Entrance marker -->
  <rect x="360" y="510" width="60" height="20" rx="3" fill="#333" stroke="#555" stroke-width="1"/>
  <text x="390" y="524" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#888" text-anchor="middle">ENTRADA</text>
  <!-- Arrow pointing to Karolay -->
  <g transform="translate(635,60)">
    <polygon points="0,10 -6,0 6,0" fill="#9b6d53" opacity="0.7"/>
  </g>
  <text x="635" y="55" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#9b6d53" text-anchor="middle" opacity="0.8" letter-spacing="1">ESTAMOS AQUI</text>
</svg>