<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#201e1e"/>
      <stop offset="50%" style="stop-color:#2a2626"/>
      <stop offset="100%" style="stop-color:#1a1717"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9b6d53"/>
      <stop offset="100%" style="stop-color:#7a5640"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect x="0" y="780" width="600" height="20" fill="url(#accent)" opacity="0.6"/>
  <rect x="0" y="0" width="600" height="4" fill="#9b6d53" opacity="0.8"/>
  <!-- Skirt + outfit silhouette -->
  <g transform="translate(300,310)" opacity="0.15">
    <!-- Hanger/top -->
    <path d="M-30,-140 L-50,-100 L-80,-100 L-80,-60 L80,-60 L80,-100 L50,-100 L30,-140 Z" fill="#9b6d53" stroke="#9b6d53" stroke-width="2"/>
    <!-- Skirt -->
    <path d="M-60,-60 L-100,120 Q-105,140 -85,140 L85,140 Q105,140 100,120 L60,-60 Z" fill="#9b6d53" stroke="#9b6d53" stroke-width="2"/>
    <line x1="-60" y1="-60" x2="60" y2="-60" stroke="#7a5640" stroke-width="2"/>
    <path d="M-30,-60 Q-40,40 -60,120" fill="none" stroke="#7a5640" stroke-width="1"/>
    <path d="M30,-60 Q40,40 60,120" fill="none" stroke="#7a5640" stroke-width="1"/>
    <path d="M0,-60 Q0,40 0,120" fill="none" stroke="#7a5640" stroke-width="1"/>
  </g>
  <!-- Text -->
  <text x="300" y="545" font-family="'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="700" fill="#9b6d53" text-anchor="middle" letter-spacing="6">FALDAS</text>
  <text x="300" y="580" font-family="'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="300" fill="#9b6d53" text-anchor="middle" letter-spacing="6" opacity="0.7">&amp; OUTFITS</text>
  <line x1="200" y1="600" x2="400" y2="600" stroke="#9b6d53" stroke-width="1" opacity="0.5"/>
  <text x="300" y="630" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" opacity="0.4" letter-spacing="4">CLUB KAROLAY</text>
</svg>