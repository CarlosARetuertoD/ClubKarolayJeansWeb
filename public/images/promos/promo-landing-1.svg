<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#201e1e"/>
      <stop offset="100%" stop-color="#110a06"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9b6d53" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#9b6d53" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="silhouetteGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1715"/>
      <stop offset="100%" stop-color="#0d0907"/>
    </linearGradient>
    <clipPath id="frameClip">
      <rect x="0" y="0" width="1200" height="800" rx="0"/>
    </clipPath>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20"/>
      <feOffset dx="0" dy="10"/>
      <feComposite in2="SourceAlpha" operator="arithmetic" k1="0" k2="1" k3="0" k4="0"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg1)"/>

  <!-- Subtle texture overlay -->
  <rect width="1200" height="800" fill="#9b6d53" opacity="0.03"/>

  <!-- Diagonal accent light -->
  <ellipse cx="850" cy="400" rx="500" ry="700" fill="#9b6d53" opacity="0.07" transform="rotate(-15, 850, 400)"/>

  <!-- Bottom accent glow -->
  <ellipse cx="600" cy="850" rx="600" ry="200" fill="#9b6d53" opacity="0.12"/>

  <!-- Vertical accent line left -->
  <rect x="80" y="60" width="1" height="680" fill="#9b6d53" opacity="0.4"/>
  <rect x="84" y="100" width="1" height="600" fill="#9b6d53" opacity="0.2"/>

  <!-- Vertical accent line right -->
  <rect x="1119" y="60" width="1" height="680" fill="#9b6d53" opacity="0.4"/>
  <rect x="1115" y="100" width="1" height="600" fill="#9b6d53" opacity="0.2"/>

  <!-- Silhouette: Full body standing person wearing jeans -->
  <g transform="translate(520, 80)" opacity="0.95">
    <!-- Head -->
    <ellipse cx="80" cy="30" rx="28" ry="34" fill="#151210"/>
    <!-- Hair -->
    <path d="M52 20 Q55 -5 80 -8 Q105 -5 108 20 Q108 10 100 5 Q80 -2 60 5 Q52 10 52 20Z" fill="#0e0b09"/>
    <!-- Neck -->
    <rect x="68" y="60" width="24" height="20" rx="5" fill="#151210"/>
    <!-- Torso - fitted jacket -->
    <path d="M40 78 Q38 80 35 85 L25 180 Q24 195 35 200 L55 205 L55 210 L105 210 L105 205 L125 200 Q136 195 135 180 L125 85 Q122 80 120 78 Q105 72 80 70 Q55 72 40 78Z" fill="#1a1613"/>
    <!-- Jacket lapels -->
    <path d="M65 78 L55 120 L75 105 Z" fill="#1e1a16" opacity="0.8"/>
    <path d="M95 78 L105 120 L85 105 Z" fill="#1e1a16" opacity="0.8"/>
    <!-- Jacket center line -->
    <line x1="80" y1="105" x2="80" y2="210" stroke="#252017" stroke-width="1"/>
    <!-- Belt -->
    <rect x="45" y="208" width="70" height="8" rx="2" fill="#0e0b08"/>
    <rect x="76" y="209" width="8" height="6" rx="1" fill="#9b6d53" opacity="0.6"/>
    <!-- Left arm -->
    <path d="M40 82 L22 160 Q18 175 22 185 L28 200 Q30 204 34 202 L38 195 L35 178 L42 110 Z" fill="#1a1613"/>
    <!-- Right arm -->
    <path d="M120 82 L138 160 Q142 175 138 185 L132 200 Q130 204 126 202 L122 195 L125 178 L118 110 Z" fill="#1a1613"/>
    <!-- Left hand -->
    <path d="M28 198 Q24 206 26 210 Q28 214 32 212 L36 204 Z" fill="#151210"/>
    <!-- Right hand -->
    <path d="M132 198 Q136 206 134 210 Q132 214 128 212 L124 204 Z" fill="#151210"/>
    <!-- Jeans - left leg -->
    <path d="M48 216 L42 380 Q40 420 38 460 L32 620 Q31 635 38 638 L58 640 Q62 638 61 630 L58 460 Q58 420 58 380 L62 216 Z" fill="#16130f"/>
    <!-- Jeans - right leg -->
    <path d="M98 216 L102 380 Q102 420 102 460 L108 620 Q109 635 102 638 L82 640 Q78 638 79 630 L82 460 Q82 420 82 380 L78 216 Z" fill="#16130f"/>
    <!-- Jean details - seams -->
    <line x1="50" y1="220" x2="46" y2="460" stroke="#1e1a15" stroke-width="0.8"/>
    <line x1="58" y1="220" x2="56" y2="460" stroke="#1e1a15" stroke-width="0.8"/>
    <line x1="100" y1="220" x2="104" y2="460" stroke="#1e1a15" stroke-width="0.8"/>
    <line x1="92" y1="220" x2="94" y2="460" stroke="#1e1a15" stroke-width="0.8"/>
    <!-- Left pocket stitch -->
    <path d="M50 230 Q45 240 46 260" fill="none" stroke="#1e1a15" stroke-width="0.6"/>
    <!-- Right pocket stitch -->
    <path d="M102 230 Q107 240 106 260" fill="none" stroke="#1e1a15" stroke-width="0.6"/>
    <!-- Shoes -->
    <path d="M30 636 L26 648 Q24 656 32 658 L58 660 Q64 658 62 650 L60 638 Z" fill="#0a0806"/>
    <path d="M106 636 L110 648 Q112 656 104 658 L78 660 Q72 658 74 650 L76 638 Z" fill="#0a0806"/>
    <!-- Shoe soles -->
    <rect x="26" y="656" width="36" height="4" rx="2" fill="#9b6d53" opacity="0.3"/>
    <rect x="78" y="656" width="36" height="4" rx="2" fill="#9b6d53" opacity="0.3"/>
  </g>

  <!-- Floor reflection -->
  <ellipse cx="600" cy="755" rx="180" ry="12" fill="#9b6d53" opacity="0.06"/>

  <!-- Top text: NUEVA TEMPORADA -->
  <text x="600" y="105" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="100" font-size="16" letter-spacing="18" fill="#9b6d53" opacity="0.9">NUEVA TEMPORADA</text>

  <!-- Decorative line under top text -->
  <line x1="480" y1="118" x2="720" y2="118" stroke="#9b6d53" stroke-width="0.5" opacity="0.5"/>

  <!-- Main heading: OTONO 2026 -->
  <text x="170" y="420" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="300" font-size="72" letter-spacing="6" fill="#e8ddd4" opacity="0.95">O</text>
  <text x="170" y="490" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="300" font-size="72" letter-spacing="6" fill="#e8ddd4" opacity="0.95">T</text>
  <text x="170" y="560" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="300" font-size="72" letter-spacing="6" fill="#e8ddd4" opacity="0.95">O</text>

  <!-- Right side vertical text -->
  <text x="1020" y="340" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="100" font-size="14" letter-spacing="10" fill="#9b6d53" opacity="0.6" transform="rotate(90, 1020, 340)">2026</text>

  <!-- Bottom text block -->
  <text x="820" y="620" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="200" font-size="48" letter-spacing="12" fill="#e8ddd4" opacity="0.9">2026</text>
  <text x="820" y="660" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="100" font-size="14" letter-spacing="8" fill="#9b6d53" opacity="0.7">COLLECTION</text>

  <!-- Accent block -->
  <rect x="810" y="675" width="40" height="2" fill="#9b6d53" opacity="0.6"/>

  <!-- Brand mark bottom -->
  <text x="600" y="775" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="100" font-size="11" letter-spacing="12" fill="#9b6d53" opacity="0.4">CLUB KAROLAY JEANS</text>

  <!-- Corner accents -->
  <line x1="40" y1="40" x2="100" y2="40" stroke="#9b6d53" stroke-width="0.5" opacity="0.4"/>
  <line x1="40" y1="40" x2="40" y2="100" stroke="#9b6d53" stroke-width="0.5" opacity="0.4"/>
  <line x1="1160" y1="40" x2="1100" y2="40" stroke="#9b6d53" stroke-width="0.5" opacity="0.4"/>
  <line x1="1160" y1="40" x2="1160" y2="100" stroke="#9b6d53" stroke-width="0.5" opacity="0.4"/>
  <line x1="40" y1="760" x2="100" y2="760" stroke="#9b6d53" stroke-width="0.5" opacity="0.4"/>
  <line x1="40" y1="760" x2="40" y2="700" stroke="#9b6d53" stroke-width="0.5" opacity="0.4"/>
  <line x1="1160" y1="760" x2="1100" y2="760" stroke="#9b6d53" stroke-width="0.5" opacity="0.4"/>
  <line x1="1160" y1="760" x2="1160" y2="700" stroke="#9b6d53" stroke-width="0.5" opacity="0.4"/>
</svg>