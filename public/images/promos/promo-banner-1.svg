<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#201e1e"/>
      <stop offset="40%" style="stop-color:#2a2626"/>
      <stop offset="100%" style="stop-color:#181515"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9b6d53;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#9b6d53;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#9b6d53;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)"/>
  <!-- Top/bottom accent lines -->
  <rect x="0" y="0" width="1200" height="4" fill="#9b6d53" opacity="0.7"/>
  <rect x="0" y="596" width="1200" height="4" fill="#9b6d53" opacity="0.7"/>
  <!-- Decorative leaf/autumn elements -->
  <g opacity="0.06">
    <circle cx="150" cy="300" r="180" fill="#9b6d53"/>
    <circle cx="1050" cy="300" r="180" fill="#9b6d53"/>
  </g>
  <!-- Horizontal accent bar -->
  <rect x="100" y="230" width="1000" height="1" fill="url(#accentBar)"/>
  <rect x="100" y="370" width="1000" height="1" fill="url(#accentBar)"/>
  <!-- Season label -->
  <text x="600" y="270" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#9b6d53" text-anchor="middle" opacity="0.7" letter-spacing="10">NUEVA TEMPORADA</text>
  <!-- Main text -->
  <text x="600" y="330" font-family="'Helvetica Neue', Arial, sans-serif" font-size="64" font-weight="800" fill="#9b6d53" text-anchor="middle" letter-spacing="12">TEMPORADA</text>
  <text x="600" y="360" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#ffffff" text-anchor="middle" opacity="0.5" letter-spacing="16">2026</text>
  <!-- Subtitle -->
  <text x="600" y="420" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" opacity="0.35" letter-spacing="6">CLUB KAROLAY JEANS</text>
  <!-- Decorative corner elements -->
  <path d="M30,30 L80,30 M30,30 L30,80" stroke="#9b6d53" stroke-width="2" opacity="0.4"/>
  <path d="M1170,30 L1120,30 M1170,30 L1170,80" stroke="#9b6d53" stroke-width="2" opacity="0.4"/>
  <path d="M30,570 L80,570 M30,570 L30,520" stroke="#9b6d53" stroke-width="2" opacity="0.4"/>
  <path d="M1170,570 L1120,570 M1170,570 L1170,520" stroke="#9b6d53" stroke-width="2" opacity="0.4"/>
</svg>