<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bg2" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#1a1715"/>
      <stop offset="50%" stop-color="#110e0b"/>
      <stop offset="100%" stop-color="#0a0806"/>
    </linearGradient>
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ddb153" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ddb153" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="circleGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ddb153" stop-opacity="0.12"/>
      <stop offset="70%" stop-color="#ddb153" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ddb153" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ddb153" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ddb153" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ddb153" stop-opacity="0"/>
    </linearGradient>
    <filter id="glowGold">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg2)"/>

  <!-- Ambient gold glow behind circle -->
  <circle cx="380" cy="400" r="350" fill="url(#goldGlow)"/>

  <!-- Large accent circle -->
  <circle cx="380" cy="400" r="260" fill="none" stroke="#ddb153" stroke-width="0.8" opacity="0.25"/>
  <circle cx="380" cy="400" r="258" fill="url(#circleGrad)"/>

  <!-- Inner decorative circle -->
  <circle cx="380" cy="400" r="220" fill="none" stroke="#ddb153" stroke-width="0.3" opacity="0.15"/>

  <!-- Outer decorative circle -->
  <circle cx="380" cy="400" r="300" fill="none" stroke="#ddb153" stroke-width="0.3" opacity="0.1" stroke-dasharray="4 8"/>

  <!-- Silhouette: Casual standing person with jeans -->
  <g transform="translate(310, 95)" opacity="0.95">
    <!-- Head -->
    <ellipse cx="70" cy="28" rx="26" ry="32" fill="#0f0d0b"/>
    <!-- Hair - casual style -->
    <path d="M44 18 Q48 -8 70 -10 Q92 -8 96 18 Q98 8 90 0 Q70 -6 50 0 Q44 8 44 18Z" fill="#0a0807"/>
    <!-- Neck -->
    <rect x="60" y="56" width="20" height="18" rx="4" fill="#0f0d0b"/>
    <!-- T-shirt / casual top -->
    <path d="M32 72 Q28 76 26 82 L20 170 Q18 182 28 186 L50 192 L50 200 L90 200 L90 192 L112 186 Q122 182 120 170 L114 82 Q112 76 108 72 Q95 66 70 64 Q45 66 32 72Z" fill="#141110"/>
    <!-- T-shirt collar -->
    <path d="M55 72 Q70 80 85 72 Q78 78 70 80 Q62 78 55 72Z" fill="#1a1714" opacity="0.7"/>
    <!-- Left arm - relaxed -->
    <path d="M32 76 L14 140 Q10 155 14 170 L18 186 Q20 190 24 188 L28 180 L24 158 L34 100 Z" fill="#141110"/>
    <!-- Right arm - hand in pocket area -->
    <path d="M108 76 L126 130 Q128 140 126 150 L120 185 Q118 190 114 186 L112 176 L116 148 L106 100 Z" fill="#141110"/>
    <!-- Left hand -->
    <path d="M18 184 Q14 192 16 196 Q18 200 22 198 L26 190 Z" fill="#0f0d0b"/>
    <!-- Right hand (partially in pocket) -->
    <path d="M120 182 Q124 188 122 194 Q120 196 116 194 L114 186 Z" fill="#0f0d0b"/>
    <!-- Belt area -->
    <rect x="38" y="198" width="64" height="7" rx="2" fill="#0a0806"/>
    <rect x="66" y="199" width="8" height="5" rx="1" fill="#ddb153" opacity="0.4"/>
    <!-- Jeans - left leg, relaxed fit -->
    <path d="M40 205 L36 360 Q34 400 32 440 L26 590 Q25 608 32 612 L54 614 Q58 612 57 604 L54 440 Q54 400 54 360 L56 205 Z" fill="#12100d"/>
    <!-- Jeans - right leg -->
    <path d="M84 205 L88 360 Q88 400 90 440 L96 590 Q97 608 90 612 L68 614 Q64 612 65 604 L68 440 Q68 400 68 360 L66 205 Z" fill="#12100d"/>
    <!-- Jean seam details -->
    <line x1="42" y1="210" x2="38" y2="440" stroke="#1a1714" stroke-width="0.7"/>
    <line x1="52" y1="210" x2="52" y2="440" stroke="#1a1714" stroke-width="0.7"/>
    <line x1="86" y1="210" x2="90" y2="440" stroke="#1a1714" stroke-width="0.7"/>
    <line x1="78" y1="210" x2="78" y2="440" stroke="#1a1714" stroke-width="0.7"/>
    <!-- Knee creases -->
    <path d="M38 380 Q46 376 54 380" fill="none" stroke="#1a1714" stroke-width="0.5"/>
    <path d="M86 380 Q78 376 68 380" fill="none" stroke="#1a1714" stroke-width="0.5"/>
    <!-- Sneakers -->
    <path d="M24 610 L20 622 Q18 632 26 634 L56 636 Q62 634 60 626 L58 612 Z" fill="#0a0806"/>
    <path d="M94 610 L98 622 Q100 632 92 634 L62 636 Q56 634 58 626 L60 612 Z" fill="#0a0806"/>
    <!-- Sneaker details -->
    <line x1="24" y1="626" x2="56" y2="626" stroke="#ddb153" stroke-width="0.8" opacity="0.3"/>
    <line x1="62" y1="626" x2="94" y2="626" stroke="#ddb153" stroke-width="0.8" opacity="0.3"/>
    <rect x="20" y="632" width="38" height="4" rx="2" fill="#1a1714"/>
    <rect x="60" y="632" width="38" height="4" rx="2" fill="#1a1714"/>
  </g>

  <!-- Floor shadow -->
  <ellipse cx="380" cy="740" rx="160" ry="10" fill="#ddb153" opacity="0.04"/>

  <!-- Horizontal gold line -->
  <rect x="0" y="399" width="1200" height="1" fill="url(#goldLine)" opacity="0.15"/>

  <!-- CLUB VIP text block - right side -->
  <text x="720" y="280" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="100" font-size="18" letter-spacing="20" fill="#ddb153" opacity="0.6">MEMBERS ONLY</text>

  <!-- Small gold circle accent near text -->
  <circle cx="720" cy="330" r="30" fill="none" stroke="#ddb153" stroke-width="1.5" opacity="0.5"/>
  <circle cx="720" cy="330" r="4" fill="#ddb153" opacity="0.4"/>

  <!-- CLUB text -->
  <text x="770" y="370" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="200" font-size="96" letter-spacing="16" fill="#f0e8dc">CLUB</text>

  <!-- VIP text with gold -->
  <text x="770" y="455" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="700" font-size="96" letter-spacing="20" fill="#ddb153" filter="url(#glowGold)">VIP</text>

  <!-- Decorative line -->
  <rect x="770" y="475" width="120" height="1.5" fill="#ddb153" opacity="0.5"/>
  <rect x="770" y="480" width="60" height="1" fill="#ddb153" opacity="0.3"/>

  <!-- DESCUENTO EXCLUSIVO -->
  <text x="770" y="530" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="300" font-size="28" letter-spacing="8" fill="#e8ddd4" opacity="0.85">DESCUENTO</text>
  <text x="770" y="565" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="100" font-size="28" letter-spacing="14" fill="#ddb153" opacity="0.7">EXCLUSIVO</text>

  <!-- Percentage accent -->
  <text x="770" y="640" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="200" font-size="48" fill="#ddb153" opacity="0.25">%</text>

  <!-- Corner accents - gold -->
  <path d="M40 40 L100 40" fill="none" stroke="#ddb153" stroke-width="0.5" opacity="0.4"/>
  <path d="M40 40 L40 100" fill="none" stroke="#ddb153" stroke-width="0.5" opacity="0.4"/>
  <path d="M1160 40 L1100 40" fill="none" stroke="#ddb153" stroke-width="0.5" opacity="0.4"/>
  <path d="M1160 40 L1160 100" fill="none" stroke="#ddb153" stroke-width="0.5" opacity="0.4"/>
  <path d="M40 760 L100 760" fill="none" stroke="#ddb153" stroke-width="0.5" opacity="0.4"/>
  <path d="M40 760 L40 700" fill="none" stroke="#ddb153" stroke-width="0.5" opacity="0.4"/>
  <path d="M1160 760 L1100 760" fill="none" stroke="#ddb153" stroke-width="0.5" opacity="0.4"/>
  <path d="M1160 760 L1160 700" fill="none" stroke="#ddb153" stroke-width="0.5" opacity="0.4"/>

  <!-- Small corner diamonds -->
  <rect x="37" y="37" width="6" height="6" fill="#ddb153" opacity="0.3" transform="rotate(45, 40, 40)"/>
  <rect x="1157" y="37" width="6" height="6" fill="#ddb153" opacity="0.3" transform="rotate(45, 1160, 40)"/>
  <rect x="37" y="757" width="6" height="6" fill="#ddb153" opacity="0.3" transform="rotate(45, 40, 760)"/>
  <rect x="1157" y="757" width="6" height="6" fill="#ddb153" opacity="0.3" transform="rotate(45, 1160, 760)"/>

  <!-- Brand mark bottom -->
  <text x="600" y="775" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="100" font-size="11" letter-spacing="12" fill="#ddb153" opacity="0.35">CLUB KAROLAY JEANS</text>

  <!-- Subtle top border accent -->
  <rect x="400" y="0" width="400" height="2" fill="#ddb153" opacity="0.15"/>
  <rect x="400" y="798" width="400" height="2" fill="#ddb153" opacity="0.15"/>
</svg>