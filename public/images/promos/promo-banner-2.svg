<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#201e1e"/>
      <stop offset="40%" style="stop-color:#2a2626"/>
      <stop offset="100%" style="stop-color:#181515"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#9b6d53;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#9b6d53;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)"/>
  <rect width="1200" height="600" fill="url(#glow)"/>
  <!-- Top/bottom accent lines -->
  <rect x="0" y="0" width="1200" height="4" fill="#9b6d53" opacity="0.7"/>
  <rect x="0" y="596" width="1200" height="4" fill="#9b6d53" opacity="0.7"/>
  <!-- VIP badge -->
  <g transform="translate(600,180)">
    <circle r="60" fill="none" stroke="#9b6d53" stroke-width="2" opacity="0.5"/>
    <circle r="50" fill="none" stroke="#9b6d53" stroke-width="1" opacity="0.3"/>
    <text y="8" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#9b6d53" text-anchor="middle">VIP</text>
  </g>
  <!-- Main text -->
  <text x="600" y="310" font-family="'Helvetica Neue', Arial, sans-serif" font-size="58" font-weight="800" fill="#9b6d53" text-anchor="middle" letter-spacing="8">DESCUENTO</text>
  <text x="600" y="365" font-family="'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="700" fill="#9b6d53" text-anchor="middle" letter-spacing="12">CLUB VIP</text>
  <!-- Subtitle -->
  <line x1="350" y1="400" x2="850" y2="400" stroke="#9b6d53" stroke-width="1" opacity="0.3"/>
  <text x="600" y="440" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#ffffff" text-anchor="middle" opacity="0.4" letter-spacing="6">BENEFICIOS EXCLUSIVOS PARA MIEMBROS</text>
  <text x="600" y="480" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" opacity="0.3" letter-spacing="4">CLUB KAROLAY JEANS</text>
  <!-- Corner elements -->
  <path d="M30,30 L80,30 M30,30 L30,80" stroke="#9b6d53" stroke-width="2" opacity="0.4"/>
  <path d="M1170,30 L1120,30 M1170,30 L1170,80" stroke="#9b6d53" stroke-width="2" opacity="0.4"/>
  <path d="M30,570 L80,570 M30,570 L30,520" stroke="#9b6d53" stroke-width="2" opacity="0.4"/>
  <path d="M1170,570 L1120,570 M1170,570 L1170,520" stroke="#9b6d53" stroke-width="2" opacity="0.4"/>
</svg>